<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productivity Dashboard</title>
    <link rel="shortcut icon" href="./checklist.png" type="image/x-icon" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="main">
      <section class="allElems">
        <header>
          <div class="header1">
            <h2></h2>
            <h1></h1>
            <h4>Bhopal (M.P)</h4>
          </div>
          <div class="header2">
            <h2></h2>
            <h4></h4>
            <h3 class="precipitation"></h3>
            <h3 class="humidity"></h3>
            <h3 class="wind"></h3>
          </div>
        </header>
        <div class="allFeatures">
          <div class="todo elems" id="0">
            <img
              src="https://plus.unsplash.com/premium_photo-1681150896592-4c89585c3543?q=80&w=2156&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt=""
            />
            <h2>Todo List</h2>
          </div>
          <div class="daily elems" id="1">
            <img
              src="https://images.unsplash.com/photo-1655012325191-cbc22182fa9f?q=80&w=2224&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt=""
            />
            <h2>Daily Planner</h2>
          </div>
          <div class="moti elems" id="2">
            <img
              src="https://images.unsplash.com/photo-1661313563001-c689cc83790c?q=80&w=2224&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt=""
            />
            <h2>Quotes</h2>
          </div>
          <div class="pomo elems" id="3">
            <img
              src="https://plus.unsplash.com/premium_photo-1681150897479-282fdba539cf?q=80&w=1760&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt=""
            />
            <h2>Pomodoro</h2>
          </div>
          <div class="daily elems" id="4">
            <img
              src="https://plus.unsplash.com/premium_photo-1681150896563-66eec44865f8?q=80&w=1760&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
              alt=""
            />
            <h2>Daily Goals</h2>
          </div>
        </div>
      </section>
      <section class="fullelem todo-list-fullpage">
        <button class="back" id="0"><i class="ri-arrow-left-line"></i></button>

        <h2>Your Personalised To-Do List</h2>

        <div class="todo-container">
          <div class="addTask">
            <form>
              <input id="task-input" type="text" placeholder="Enter Task" />
              <textarea placeholder="Enter Details" name="" id=""></textarea>
              <div class="mark-imp">
                <input type="checkbox" name="" id="check" />
                <label for="check">Mark As Important !! </label>
              </div>
              <button>Add Task</button>
            </form>
          </div>
          <div class="allTask"></div>
        </div>
      </section>
      <section class="fullelem daily-planner-fullpage">
        <button class="back" id="1"><i class="ri-arrow-left-line"></i></button>
        <h2>Plan Your Day To Be More Productive</h2>
        <div class="day-planner"></div>
      </section>
      <section class="fullelem Motivational-fullpage">
        <button class="back" id="2"><i class="ri-arrow-left-line"></i></button>
        <div class="motivation-fullPage-container">
          <div class="motivational-container">
            <div class="motivational-wrapper">
              <img src="./icons8-quotes-50 (1).png" alt="" />
              <div class="motivation-1">
                <h2>Quote Of The Day</h2>
              </div>
              <div class="motivation-2">
                <h1></h1>
              </div>
              <div class="motivation-3">
                <h2></h2>
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="fullelem pomodoro-fullpage">
        <button class="back" id="3"><i class="ri-arrow-left-line"></i></button>
        <h2>Study With Me !!</h2>
        <h4 class="session">Work Session</h4>
        <div class="pomo-timer">
          <h1>25:00</h1>
          <button class="start-timer">Start</button>
          <button class="pause-timer">Pause</button>
          <button class="reset-timer">Reset</button>
        </div>
      </section>
      <section class="fullelem daily-goals-fullpage">
        <button class="back" id="4"><i class="ri-arrow-left-line"></i></button>
        <h1>Daily Goals</h1>
      </section>

      <div class="theme" ><i class="ri-sun-line"></i></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
